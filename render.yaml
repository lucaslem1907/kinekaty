services:
  - type: web
    name: kinekaty-dotnet
    runtime: docker
    dockerfilePath: ./backend-dotnet/Dockerfile
    dockerContext: ./backend-dotnet
    plan: free
    envVars:
      # Set in Render dashboard: Host=db.YOUR_REF.supabase.co;Port=5432;Database=postgres;Username=postgres;Password=...;SSL Mode=Require;Trust Server Certificate=true
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: KinekatyApi
      - key: Jwt__Audience
        value: KinekatyApi
      # Set in Render dashboard: your Vercel frontend URL (for CORS)
      - key: Frontend__Url
        sync: false
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

# PostgreSQL is hosted on Supabase — no databases block needed
